steps:
  - name: "gcr.io/cloud-builders/docker"
    args: ["build", "-t", "gcr.io/$PROJECT_ID/vision-ai-backend", "-f", "Dockerfile", "."]

  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/vision-ai-backend"]

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    args:
      - gcloud
      - run
      - deploy
      - vision-ai-backend
      - --image
      - gcr.io/$PROJECT_ID/vision-ai-backend
      - --region
      - us-central1
      - --allow-unauthenticated
      - --platform
      - managed

images:
  - gcr.io/$PROJECT_ID/vision-ai-backend

options:
  logging: CLOUD_LOGGING_ONLY
