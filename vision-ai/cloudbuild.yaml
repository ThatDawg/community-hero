steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/vision-ai-backend', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/vision-ai-backend']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'vision-ai-backend'
      - '--image'
      - 'gcr.io/$PROJECT_ID/vision-ai-backend'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '2Gi'
      - '--cpu'
      - '2'
      - '--set-env-vars'
      - 'GOOGLE_API_KEY=${_GOOGLE_API_KEY},FIREBASE_CREDENTIALS_PATH=${_FIREBASE_CREDENTIALS_PATH}'

images:
  - 'gcr.io/$PROJECT_ID/vision-ai-backend'

timeout: '600s'
options:
  logging: CLOUD_LOGGING_ONLY
